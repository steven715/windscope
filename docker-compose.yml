services:
  premarket:
    build: .
    container_name: premarket
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Taipei
      PREMARKET_NOTIFY: telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
